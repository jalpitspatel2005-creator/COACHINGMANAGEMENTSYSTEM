<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COACHIFY | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border: 1px solid var(--border-color);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: var(--primary-color);
            font-weight: 700;
        }
        .form-control {
            background-color: var(--input-bg);
            color: var(--text-color);
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid var(--border-color);
            margin-bottom: 20px;
        }
        .form-control:focus {
            background-color: var(--input-bg);
            color: var(--text-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(67, 97, 238, 0.25);
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .btn-login {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: var(--hover-gradient);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
            color: white;
        }
        .alert {
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="page-fade-in">
    <div class="login-card stagger-in">
        <div class="logo">
            <h1 class="animate-float">🔐 COACHIFY</h1>
            <p class="text-muted">Coaching Management System</p>
        </div>
        
        <div id="errorAlert" class="alert alert-danger d-none"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email address" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
            </div>
            <div class="mb-3">
                <select class="form-control" id="role" required>
                    <option value="">Select Role</option>
                    <option value="admin">Admin</option>
                    <option value="coach">Coach</option>
                    <option value="student">Student</option>
                </select>
            </div>
            <button type="submit" class="btn-login pulse-glow">Sign In</button>
        </form>
        
        <div class="text-center mt-4">
            <p class="mb-2">
                <a href="#" id="showRegister" class="text-decoration-none">New student? Register here</a>
            </p>
            <p class="text-muted small mt-3">
                Admin: admin@coachify.com / admin123
            </p>
        </div>
        
        <!-- Registration Form (Initially Hidden) -->
        <div id="registerForm" class="d-none">
            <div class="logo">
                <h3>Student Registration</h3>
            </div>
            <form id="studentRegisterForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <input type="text" class="form-control" id="firstName" placeholder="First Name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <input type="text" class="form-control" id="lastName" placeholder="Last Name" required>
                    </div>
                </div>
                <div class="mb-3">
                    <input type="email" class="form-control" id="regEmail" placeholder="Email" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" id="regPassword" placeholder="Password" required>
                </div>
                <div class="mb-3">
                    <input type="tel" class="form-control" id="phone" placeholder="Phone (optional)">
                </div>
                <button type="submit" class="btn-login">Register</button>
            </form>
            <div class="text-center mt-3">
                <a href="#" id="showLogin" class="text-decoration-none">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        // Toggle between login and registration forms
        document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginForm').closest('.login-card').querySelector('.logo').classList.add('d-none');
            document.getElementById('loginForm').classList.add('d-none');
            document.getElementById('registerForm').classList.remove('d-none');
            document.querySelector('#registerForm .logo').classList.remove('d-none');
        });
        
        document.getElementById('showLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerForm').classList.add('d-none');
            document.querySelector('#registerForm .logo').classList.add('d-none');
            document.getElementById('loginForm').closest('.login-card').querySelector('.logo').classList.remove('d-none');
            document.getElementById('loginForm').classList.remove('d-none');
        });
        
        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Redirect based on role
                    switch(data.user.role) {
                        case 'admin':
                            window.location.href = 'html/admin-dashboard.html';
                            break;
                        case 'coach':
                            window.location.href = 'html/coach-dashboard.html';
                            break;
                        case 'student':
                            window.location.href = 'html/student-dashboard.html';
                            break;
                        default:
                            showError('Unknown role');
                    }
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (error) {
                showError('Network error. Please check if backend is running.');
            }
        });
        
        // Registration form submission
        document.getElementById('studentRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const phone = document.getElementById('phone').value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/register/student`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password, phone })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Registration successful! Please wait for admin approval.');
                    // Switch back to login form
                    document.getElementById('showLogin').click();
                    // Pre-fill email
                    document.getElementById('email').value = email;
                } else {
                    showError(data.error || 'Registration failed');
                }
            } catch (error) {
                showError('Network error. Please check if backend is running.');
            }
        });
        
        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.textContent = `❌ ${message}`;
            errorAlert.classList.remove('d-none');
            setTimeout(() => errorAlert.classList.add('d-none'), 5000);
        }
        
        // Check if user is already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            
            if (token && user) {
                switch(user.role) {
                    case 'admin':
                        window.location.href = 'html/admin-dashboard.html';
                        break;
                    case 'coach':
                        window.location.href = 'html/coach-dashboard.html';
                        break;
                    case 'student':
                        window.location.href = 'html/student-dashboard.html';
                        break;
                }
            }
        });
    </script>
    <script src="js/theme.js"></script>
</body>
</html>
